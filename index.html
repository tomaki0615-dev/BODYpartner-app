<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ボディケア管理</title>

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#222;color:#fff;padding:10px;text-align:center;}
.container{padding:10px;}
.card{background:#fff;margin-bottom:10px;padding:10px;border-radius:10px;}
.tag-select{display:inline-block;padding:4px 8px;margin:2px;background:#eee;border-radius:10px;}
.tag-select.active{background:#222;color:#fff;}
.big-btn{background:#28a745;color:#fff;border:none;padding:10px;width:100%;border-radius:10px;}
</style>
</head>

<body>

<header>ボディケア管理</header>

<div class="container">
<div>
<button onclick="clearTags()">絞り込み解除</button>
</div>

<div id="filterTags"></div>
<div id="list"></div>
</div>

<script>
let raw = JSON.parse(localStorage.getItem("trainingApp") || "[]");

// 🔥 データ完全補正
let data = raw.map(item => ({
  ...item,
  id: item.id || Date.now() + Math.random(),
  name: item.name || "未設定",
  tags: Array.isArray(item.tags) ? item.tags : [],
  logs: Array.isArray(item.logs) ? item.logs : []
}));

let tagCategories = {
  type:["筋トレ","ストレッチ"],
  body:["上半身","下半身"]
};

let selectedTags = [];

// 保存
function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
}

// タグ描画
function renderTags(){
  let html="";
  Object.values(tagCategories).flat().forEach(tag=>{
    html+=`<span class="tag-select ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
  });
  document.getElementById("filterTags").innerHTML=html;
}

// タグ切替
function toggleTag(tag){
  selectedTags = selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags, tag];
  renderTags();
  render();
}

// 絞り込み解除
function clearTags(){
  selectedTags=[];
  renderTags();
  render();
}

// マッチ判定
function match(item){
  if(selectedTags.length===0) return true;
  return selectedTags.some(tag=>item.tags.includes(tag));
}

// ログ追加
function addLog(item){
  item.logs.push(new Date().toISOString());
  save();
  render();
}

// 描画
function render(){
  let list = document.getElementById("list");

  let items = data.filter(match);

  // 回数順
  items.sort((a,b)=>b.logs.length - a.logs.length);

  if(items.length===0){
    list.innerHTML="データがありません";
    return;
  }

  list.innerHTML="";

  items.forEach(item=>{
    let last=item.logs.length
      ? item.logs[item.logs.length-1].slice(0,10)
      : "-";

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b>
      <div>回数: ${item.logs.length} / 最終: ${last}</div>
      <button class="big-btn" onclick="addLog(data.find(d=>d.id==${item.id}))">
        やった！
      </button>
    `;

    list.appendChild(div);
  });
}

// 🚀 これが最重要（初期表示の鍵）
document.addEventListener("DOMContentLoaded", ()=>{
  renderTags();
  render();
});
</script>

</body>
</html>
