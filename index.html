<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ 完全版</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

.tab{
  display:flex;
}

.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}

.tab button.active{
  background:#222;
  color:#fff;
}

.container{
  padding:10px;
}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  color:#fff;
}

.type{background:#007bff;}
.time{background:#28a745;}
.freq{background:#ffc107;color:#000;}
.body{background:#e83e8c;}

.tag-select{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#eee;
  cursor:pointer;
}

.tag-select.active{
  background:#222;
  color:#fff;
}

button{
  padding:5px 10px;
  margin:2px;
}

.big-btn{
  background:#28a745;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

.star{
  font-size:20px;
  cursor:pointer;
}

img{
  width:80px;
  margin:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="tab">
  <button onclick="switchTab('list')" id="tabList" class="active">検索</button>
  <button onclick="switchTab('add')" id="tabAdd">追加</button>
</div>

<div class="container">

<div id="listTab">

<button onclick="toggleMode()">検索モード: <span id="mode">OR</span></button>

<div id="filterTags"></div>
<div id="list"></div>

</div>

<div id="addTab" style="display:none">

<input id="name" placeholder="名前"><br><br>

<div id="addTags"></div>

<textarea id="memo" placeholder="メモ"></textarea><br><br>

<input type="file" id="imageInput" multiple><br><br>

<button onclick="addItem()">追加</button>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("trainingApp") || "[]");

const tagCategories = {
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
};

let selectedTags = [];
let addSelectedTags = [];
let mode = "OR";

// DOM
const listTab = document.getElementById("listTab");
const addTab = document.getElementById("addTab");
const filterTags = document.getElementById("filterTags");
const addTags = document.getElementById("addTags");
const list = document.getElementById("list");

function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
}

function switchTab(tab){
  listTab.style.display = tab==="list"?"block":"none";
  addTab.style.display = tab==="add"?"block":"none";
  tabList.classList.toggle("active",tab==="list");
  tabAdd.classList.toggle("active",tab==="add");
}

function renderTags(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}：</div>`;
    tags.forEach(tag=>{
      html+=`<span class="tag-select ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
    });
  });
  filterTags.innerHTML=html;

  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}：</div>`;
    tags.forEach(tag=>{
      addHtml+=`<span class="tag-select ${addSelectedTags.includes(tag)?"active":""}" onclick="toggleAddTag('${tag}')">${tag}</span>`;
    });
  });
  addTags.innerHTML=addHtml;
}

function toggleTag(tag){
  selectedTags = selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];

  renderTags();
  render();
}

function toggleAddTag(tag){
  addSelectedTags = addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];

  renderTags();
}

function addItem(){
  let nameEl = document.getElementById("name");
  let memoEl = document.getElementById("memo");
  let imageEl = document.getElementById("imageInput");

  let name = nameEl.value;
  if(!name) return;

  let files = imageEl.files;
  let promises = [];

  for(let file of files){
    let p = new Promise(res=>{
      let reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.readAsDataURL(file);
    });
    promises.push(p);
  }

  Promise.all(promises).then(results=>{
    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo:memoEl.value,
      images:results,
      favorite:false,
      logs:[]
    });

    save();

    nameEl.value="";
    memoEl.value="";
    imageEl.value="";
    addSelectedTags=[];

    switchTab("list");
    renderTags();
    render();
  });
}

function toggleMode(){
  mode = mode==="OR"?"AND":"OR";
  document.getElementById("mode").innerText = mode;
  render();
}

function match(item){
  if(selectedTags.length===0) return true;

  return mode==="AND"
    ? selectedTags.every(tag=>item.tags.includes(tag))
    : selectedTags.some(tag=>item.tags.includes(tag));
}

function addLog(item){
  let today = new Date().toISOString().split('T')[0];
  if(item.logs.some(l=>l.date===today)) return;

  item.logs.push({date:today});
  save();
  render();
}

function toggleFav(item){
  item.favorite = !item.favorite;
  save();
  render();
}

function getTagClass(tag){
  for(let [cat,tags] of Object.entries(tagCategories)){
    if(tags.includes(tag)) return cat;
  }
  return "";
}

function render(){
  let filtered = data.filter(match).sort((a,b)=>b.favorite - a.favorite);

  list.innerHTML="";

  filtered.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <span class="star" onclick="toggleFav(data.find(d=>d.id==${item.id}))">
          ${item.favorite?"⭐":"☆"}
        </span>
        <b>${item.name}</b>
      </div>

      <div>
        ${item.tags.map(t=>`<span class="tag ${getTagClass(t)}">${t}</span>`).join("")}
      </div>

      <div>${item.memo||""}</div>

      <div>回数: ${item.logs.length}</div>

      <div>
        ${item.images.map(img=>`<img src="${img}">`).join("")}
      </div>

      <button class="big-btn" onclick="addLog(data.find(d=>d.id==${item.id}))">
        やった！
      </button>
    `;

    list.appendChild(div);
  });
}

renderTags();
render();
</script>

</body>
</html>
