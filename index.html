<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ 完全版</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

/* タブ */
.tab{display:flex;}
.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}
.tab button.active{
  background:#222;
  color:#fff;
}

.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

/* タグ */
.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

.tag-select{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#eee;
  cursor:pointer;
}
.tag-select.active{background:#222;color:#fff;}

/* ボタン */
button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* トースト */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="tab">
  <button id="tabList" class="active" onclick="switchTab('list')">検索</button>
  <button id="tabAdd" onclick="switchTab('add')">追加</button>
  <button id="tabTag" onclick="switchTab('tag')">タグ管理</button>
</div>

<div class="container">

<!-- 検索 -->
<div id="listTab">
  <div id="filterTags"></div>
  <div id="list"></div>
</div>

<!-- 追加 -->
<div id="addTab" style="display:none">
  <input id="name" placeholder="名前"><br><br>

  <div id="addTags"></div>

  <div>
    <b>選択中：</b>
    <div id="selectedAddTags"></div>
  </div>

  <textarea id="memo" placeholder="メモ"></textarea><br><br>
  <input type="file" id="imageInput" multiple><br><br>

  <button onclick="addItem()">追加</button>
</div>

<!-- タグ管理 -->
<div id="tagTab" style="display:none">
  <h3>タグ管理</h3>

  <select id="newTagCat">
    <option value="type">type</option>
    <option value="time">time</option>
    <option value="freq">freq</option>
    <option value="body">body</option>
  </select>

  <input id="newTagName" placeholder="タグ名">
  <button onclick="addTag()">追加</button>

  <hr>
  <div id="tagList"></div>
</div>

</div>

<div id="toast" class="toast">完了</div>

<script>

////////////////////////
// DOM
////////////////////////
const list=document.getElementById("list");
const filterTags=document.getElementById("filterTags");
const addTags=document.getElementById("addTags");
const tagList=document.getElementById("tagList");
const selectedAddTags=document.getElementById("selectedAddTags");

const listTab=document.getElementById("listTab");
const addTab=document.getElementById("addTab");
const tagTab=document.getElementById("tagTab");

////////////////////////
// データ
////////////////////////
let data=JSON.parse(localStorage.getItem("trainingApp")||"[]");

let tagCategories=JSON.parse(localStorage.getItem("tagCategories")||JSON.stringify({
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
}));

let selectedTags=[];
let addSelectedTags=[];

function save(){
  localStorage.setItem("trainingApp",JSON.stringify(data));
  localStorage.setItem("tagCategories",JSON.stringify(tagCategories));
}

////////////////////////
// タブ
////////////////////////
function switchTab(tab){

  listTab.style.display=tab==="list"?"block":"none";
  addTab.style.display=tab==="add"?"block":"none";
  tagTab.style.display=tab==="tag"?"block":"none";

  tabList.classList.toggle("active",tab==="list");
  tabAdd.classList.toggle("active",tab==="add");
  tabTag.classList.toggle("active",tab==="tag");

  renderTags();
  renderTagManager();
  render();
}

////////////////////////
// タグ描画
////////////////////////
function renderTags(){

  // 検索側
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      html+=`
        <span class="tag-select ${selectedTags.includes(tag)?"active":""}"
        onclick="toggleTag('${tag}')">${tag}</span>
      `;
    });
  });
  filterTags.innerHTML=html;

  // 追加側
  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      addHtml+=`
        <span class="tag-select ${addSelectedTags.includes(tag)?"active":""}"
        onclick="toggleAddTag('${tag}')">${tag}</span>
      `;
    });
  });
  addTags.innerHTML=addHtml;

  selectedAddTags.innerHTML=
    addSelectedTags.length
      ? addSelectedTags.map(t=>`<span class="tag">${t}</span>`).join("")
      : "なし";
}

function toggleTag(tag){
  selectedTags=selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];

  render();      // ←重要
  renderTags();
}

function toggleAddTag(tag){
  addSelectedTags=addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];

  renderTags();
}

////////////////////////
// 追加
////////////////////////
function addItem(){

  let name=document.getElementById("name").value.trim();
  if(!name) return;

  let memo=document.getElementById("memo").value;
  let files=document.getElementById("imageInput").files;

  let ps=[];
  for(let f of files){
    ps.push(new Promise(r=>{
      let fr=new FileReader();
      fr.onload=()=>r(fr.result);
      fr.readAsDataURL(f);
    }));
  }

  Promise.all(ps).then(imgs=>{

    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo,
      images:imgs,
      logs:[]
    });

    save();

    // クリア
    document.getElementById("name").value="";
    document.getElementById("memo").value="";
    document.getElementById("imageInput").value="";
    addSelectedTags=[];

    renderTags();
    render();

    toast("追加しました");
    switchTab("list");
  });
}

////////////////////////
// タグ管理
////////////////////////
function addTag(){
  let cat=newTagCat.value;
  let name=newTagName.value.trim();
  if(!name) return;

  if(!tagCategories[cat].includes(name)){
    tagCategories[cat].push(name);
  }

  save();

  newTagName.value="";
  renderTags();
  renderTagManager();
}

function renderTagManager(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<h4>${cat}</h4>`;
    tags.forEach(tag=>{
      html+=`
        <div>
          ${tag}
          <button onclick="deleteTag('${cat}','${tag}')">削除</button>
        </div>
      `;
    });
  });
  tagList.innerHTML=html;
}

function deleteTag(cat,tag){
  tagCategories[cat]=tagCategories[cat].filter(t=>t!==tag);
  save();
  renderTags();
  renderTagManager();
}

////////////////////////
// トースト
////////////////////////
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

////////////////////////
// フィルタ条件
////////////////////////
function match(item){
  if(selectedTags.length===0) return true;
  return selectedTags.some(t=>item.tags.includes(t));
}

////////////////////////
// 描画（検索反映）
////////////////////////
function render(){
  list.innerHTML="";

  let filtered=data.filter(match);

  filtered.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b><br>
      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
      <div>${item.memo||""}</div>
    `;

    list.appendChild(div);
  });
}

////////////////////////
// 初期化
////////////////////////
renderTags();
renderTagManager();
render();

</script>

</body>
</html>
