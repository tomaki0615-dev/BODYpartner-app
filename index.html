<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>からだ整え</title>

<!-- ★ アイコン -->
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">

<!-- ★ PWA風 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#222;color:#fff;padding:10px;text-align:center;font-weight:bold;}

.tab{display:flex;background:#eee;margin:10px;border-radius:10px;padding:3px;}
.tab button{flex:1;padding:10px;border:none;background:transparent;}
.tab button.active{background:#fff;border-radius:8px;}

.container{padding:10px;}
.card{background:#fff;margin-bottom:10px;padding:10px;border-radius:10px;}

.tag{background:#666;color:#fff;padding:4px 8px;margin:2px;border-radius:10px;font-size:12px;}
.tag-select{background:#eee;padding:4px 8px;margin:2px;border-radius:10px;cursor:pointer;}
.tag-select.active{background:#222;color:#fff;}

.big-btn{background:#2e7d32;color:#fff;border:none;width:100%;padding:10px;border-radius:10px;}
.big-btn.done{background:#ccc !important;color:#666 !important;pointer-events:none;}

.thumb{width:60px;height:60px;object-fit:cover;border-radius:8px;margin:2px;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;}
#mainImg{width:90vw;max-width:600px;transition:0.2s;}
</style>
</head>

<body>

<header>からだ整え管理</header>

<div class="tab">
<button id="tabList" class="active" onclick="switchTab('list')">検索</button>
<button id="tabAdd" onclick="switchTab('add')">追加</button>
<button id="tabTag" onclick="switchTab('tag')">タグ管理</button>
</div>

<div class="container">

<div id="listTab">
<div id="filterTags"></div>
<div id="list"></div>
</div>

<div id="addTab" style="display:none">
<input id="name" placeholder="名前"><br><br>
<div id="addTags"></div>
<textarea id="memo" placeholder="メモ"></textarea><br><br>
<input type="file" id="imageInput" multiple><br><br>
<button onclick="addItem()">追加</button>
</div>

<div id="tagTab" style="display:none">
<select id="newTagCat">
<option value="type">type</option>
<option value="time">time</option>
<option value="freq">freq</option>
<option value="body">body</option>
</select>
<input id="newTagName">
<button onclick="addTag()">追加</button>
<hr>
<div id="tagList"></div>
</div>

</div>

<div class="modal" id="modal">
<img id="mainImg">
</div>

<script>

/* 日付 */
function getToday(){
let d=new Date();
return `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
}

/* データ */
let data=JSON.parse(localStorage.getItem("trainingApp")||"[]");

let tagCategories=JSON.parse(localStorage.getItem("tagCategories"));
if(!tagCategories || typeof tagCategories!=="object"){
tagCategories={
type:["筋トレ","ストレッチ","マッサージ"],
time:["朝","昼","夜"],
freq:["毎日","週3","月水金"],
body:["上半身","下半身","体幹","顔"]
};
}

let selectedTags=[],addSelectedTags=[];

/* 保存 */
function save(){
localStorage.setItem("trainingApp",JSON.stringify(data));
localStorage.setItem("tagCategories",JSON.stringify(tagCategories));
}

/* タブ */
function switchTab(tab){
listTab.style.display=tab==="list"?"block":"none";
addTab.style.display=tab==="add"?"block":"none";
tagTab.style.display=tab==="tag"?"block":"none";

tabList.classList.toggle("active",tab==="list");
tabAdd.classList.toggle("active",tab==="add");
tabTag.classList.toggle("active",tab==="tag");

renderTags();render();renderTagManager();
}

/* タグ表示 */
function renderTags(){
let html="";
Object.entries(tagCategories).forEach(([cat,tags])=>{
html+=`<div><b>${cat}</b></div>`;
tags.forEach(tag=>{
html+=`<span class="tag-select ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
});
});
filterTags.innerHTML=html;

let addHtml="";
Object.entries(tagCategories).forEach(([cat,tags])=>{
addHtml+=`<div><b>${cat}</b></div>`;
tags.forEach(tag=>{
addHtml+=`<span class="tag-select ${addSelectedTags.includes(tag)?"active":""}" onclick="toggleAddTag('${tag}')">${tag}</span>`;
});
});
addTags.innerHTML=addHtml;
}

/* タグ操作 */
function toggleTag(tag){
selectedTags=selectedTags.includes(tag)?selectedTags.filter(t=>t!==tag):[...selectedTags,tag];
render();renderTags();
}
function toggleAddTag(tag){
addSelectedTags=addSelectedTags.includes(tag)?addSelectedTags.filter(t=>t!==tag):[...addSelectedTags,tag];
renderTags();
}

/* タグ管理 */
function renderTagManager(){
let html="";
Object.entries(tagCategories).forEach(([cat,tags])=>{
html+=`<h4>${cat}</h4>`;
tags.forEach(tag=>{
html+=`${tag}
<button onclick="editTag('${cat}','${tag}')">編集</button>
<button onclick="deleteTag('${cat}','${tag}')">削除</button><br>`;
});
});
tagList.innerHTML=html;
}

function addTag(){
let cat=newTagCat.value;
let name=newTagName.value.trim();
if(!name)return;
if(!tagCategories[cat].includes(name)){
tagCategories[cat].push(name);
}
newTagName.value="";
save();renderTags();renderTagManager();
}

function editTag(cat,oldTag){
let n=prompt("編集",oldTag);
if(!n)return;
let arr=tagCategories[cat];
arr[arr.indexOf(oldTag)]=n;
save();renderTags();renderTagManager();
}

function deleteTag(cat,tag){
if(!confirm(`「${tag}」削除？`))return;
tagCategories[cat]=tagCategories[cat].filter(t=>t!==tag);
save();renderTags();renderTagManager();
}

/* 画像圧縮 */
function compressImage(file){
return new Promise(res=>{
let img=new Image();
let r=new FileReader();
r.onload=e=>img.src=e.target.result;
img.onload=()=>{
let c=document.createElement("canvas");
let ctx=c.getContext("2d");
let s=Math.min(800/img.width,1);
c.width=img.width*s;
c.height=img.height*s;
ctx.drawImage(img,0,0,c.width,c.height);
res(c.toDataURL("image/jpeg",0.7));
};
r.readAsDataURL(file);
});
}

/* 追加 */
function addItem(){
let name=document.getElementById("name").value.trim();
if(!name)return;

let memo=document.getElementById("memo").value;
let files=imageInput.files;

let ps=[];
for(let f of files) ps.push(compressImage(f));

Promise.all(ps).then(imgs=>{
data.push({
id:Date.now(),
name,
tags:addSelectedTags,
memo,
images:imgs,
logs:[]
});
save();

alert("追加しました");

document.getElementById("name").value="";
document.getElementById("memo").value="";
imageInput.value="";
addSelectedTags=[];

switchTab("list");
});
}

/* ログ */
function addLog(id){
let item=data.find(d=>d.id==id);
let today=getToday();
if(item.logs.some(l=>l.date===today)){
alert("今日は記録済み");
return;
}
item.logs.push({date:today});
save();render();
}

/* 描画 */
function render(){
list.innerHTML="";
let today=getToday();

data.filter(item=>{
return selectedTags.length===0 || selectedTags.every(t=>item.tags.includes(t));
})
.forEach(item=>{
let done=item.logs.some(l=>l.date===today);

list.innerHTML+=`
<div class="card">
<b>${item.name}</b>

<div>${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>

<div>${item.memo||""}</div>

<div>回数:${item.logs.length}</div>
<div>最終:${item.logs.length?item.logs[item.logs.length-1].date:"-"}</div>

<div>
${(item.images||[]).map(img=>`<img class="thumb" src="${img}" onclick="openGallery(${item.id})">`).join("")}
</div>

<button class="big-btn ${done?'done':''}" ${done?'disabled':''}
onclick="addLog(${item.id})">
${done?"済":"やった！"}
</button>

<div>
<button onclick="editItem(${item.id})">編集</button>
<button onclick="deleteItem(${item.id})">削除</button>
</div>

</div>`;
});
}

/* 編集削除 */
function editItem(id){
let item=data.find(d=>d.id==id);
let n=prompt("名前",item.name);
if(n===null)return;
let m=prompt("メモ",item.memo||"");
if(m===null)return;
item.name=n;
item.memo=m;
save();render();
}

function deleteItem(id){
if(!confirm("削除する？"))return;
data=data.filter(d=>d.id!==id);
save();render();
}

/* ギャラリー */
let g=[],i=0,startX=0,startY=0,dy=0;

function openGallery(id){
let item=data.find(d=>d.id==id);
g=item.images||[];
i=0;

modal.style.display="flex";
mainImg.src=g[i];

mainImg.ontouchstart=e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
};

mainImg.ontouchmove=e=>{
dy=e.touches[0].clientY-startY;
if(dy>0) mainImg.style.transform=`translateY(${dy}px)`;
};

mainImg.ontouchend=e=>{
let dx=startX-e.changedTouches[0].clientX;

if(Math.abs(dx)>50 && Math.abs(dy)<50){
dx>0?next():prev();
}

if(dy>120) closeModal();

mainImg.style.transform="";
};
}

function next(){i=(i+1)%g.length;mainImg.src=g[i];}
function prev(){i=(i-1+g.length)%g.length;mainImg.src=g[i];}
function closeModal(){modal.style.display="none";}

/* 初期 */
renderTags();
render();
renderTagManager();

</script>

</body>
</html>
