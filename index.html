<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<!-- 🔥 ホーム画面アイコン（iOS/Android共通） -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png" type="image/png">

<!-- 🔥 PWAマニフェスト -->
<link rel="manifest" href="manifest.json">

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

/* タブ */
.tab{display:flex;border-bottom:1px solid #ccc;}
.tab button{
  flex:1;
  padding:12px;
  border:none;
  background:#ddd;
}
.tab button.active{
  background:#fff;
  border-bottom:2px solid #222;
}

/* カード */
.container{padding:10px;}
.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

/* タグ */
.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

/* ボタン */
button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* サムネ */
.thumb{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  margin:2px;
}

/* ギャラリー */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
}

#mainImg{
  width:90vw;
  max-width:600px;
  border-radius:10px;
}

/* トースト */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<header>筋トレ管理</header>

<div class="tab">
  <button id="tabList" class="active" onclick="switchTab('list')">検索</button>
  <button id="tabAdd" onclick="switchTab('add')">追加</button>
  <button id="tabTag" onclick="switchTab('tag')">タグ管理</button>
</div>

<div class="container">

<div id="listTab">
  <div id="filterTags"></div>
  <div id="list"></div>
</div>

<div id="addTab" style="display:none">
  <input id="name" placeholder="名前"><br><br>
  <div id="addTags"></div>
  <textarea id="memo" placeholder="メモ"></textarea><br><br>
  <input type="file" id="imageInput" multiple><br><br>
  <button onclick="addItem()">追加</button>
</div>

<div id="tagTab" style="display:none">
  <h3>タグ管理</h3>
  <select id="newTagCat">
    <option value="type">type</option>
    <option value="time">time</option>
    <option value="freq">freq</option>
    <option value="body">body</option>
  </select>
  <input id="newTagName">
  <button onclick="addTag()">追加</button>
  <hr>
  <div id="tagList"></div>
</div>

</div>

<!-- ギャラリー -->
<div class="modal" id="modal">
  <img id="mainImg">
  <div>
    <button onclick="prev()">◀</button>
    <button onclick="next()">▶</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>

////////////////////
// データ
////////////////////
let data=JSON.parse(localStorage.getItem("trainingApp")||"[]");

let tagCategories=JSON.parse(localStorage.getItem("tagCategories")||JSON.stringify({
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
}));

let selectedTags=[];
let addSelectedTags=[];

function save(){
  localStorage.setItem("trainingApp",JSON.stringify(data));
  localStorage.setItem("tagCategories",JSON.stringify(tagCategories));
}

////////////////////
// タブ
////////////////////
function switchTab(tab){

  listTab.style.display=tab==="list"?"block":"none";
  addTab.style.display=tab==="add"?"block":"none";
  tagTab.style.display=tab==="tag"?"block":"none";

  tabList.classList.toggle("active",tab==="list");
  tabAdd.classList.toggle("active",tab==="add");
  tabTag.classList.toggle("active",tab==="tag");

  render();
}

////////////////////
// カード描画
////////////////////
function render(){

  list.innerHTML="";

  data.forEach(item=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b><br>

      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}

      <div>${item.memo||""}</div>

      <!-- ⭐ 最終日復活 -->
      <div>
        回数：${item.logs?.length||0}
      </div>
      <div>
        最終：${
          item.logs?.length
            ? item.logs[item.logs.length-1].date
            : "-"
        }
      </div>

      <div>
        ${(item.images||[]).map(img=>
          `<img class="thumb" src="${img}" onclick="openGallery(${item.id})">`
        ).join("")}
      </div>

      <button class="big-btn" onclick="addLog(${item.id})">
        やった！
      </button>

      <div>
        <button onclick="editItem(${item.id})">編集</button>
        <button onclick="deleteItem(${item.id})">削除</button>
      </div>
    `;

    list.appendChild(div);
  });
}

////////////////////
// ギャラリー
////////////////////
let g=[],idx=0;

function openGallery(id){
  let item=data.find(d=>d.id==id);
  g=item.images;
  idx=0;
  modal.style.display="flex";
  mainImg.src=g[idx];
}

function next(){
  idx=(idx+1)%g.length;
  mainImg.src=g[idx];
}

function prev(){
  idx=(idx-1+g.length)%g.length;
  mainImg.src=g[idx];
}

function closeModal(){
  modal.style.display="none";
}

////////////////////
// やった
////////////////////
function addLog(id){
  let item=data.find(d=>d.id==id);
  let today=new Date().toISOString().split("T")[0];

  if(item.logs.some(l=>l.date===today)) return;

  item.logs.push({date:today});
  save();
  render();
}

////////////////////
// 追加
////////////////////
function addItem(){

  let name=document.getElementById("name").value;
  let memo=document.getElementById("memo").value;
  let files=imageInput.files;

  let ps=[];

  for(let f of files){
    ps.push(new Promise(r=>{
      let fr=new FileReader();
      fr.onload=()=>r(fr.result);
      fr.readAsDataURL(f);
    }));
  }

  Promise.all(ps).then(imgs=>{

    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo,
      images:imgs,
      logs:[]
    });

    save();

    name.value="";
    memo.value="";
    imageInput.value="";
    addSelectedTags=[];

    toast("追加しました");
    render();
    switchTab("list");
  });
}

////////////////////
// タグ管理
////////////////////
function addTag(){
  let cat=newTagCat.value;
  let name=newTagName.value;

  if(!tagCategories[cat].includes(name)){
    tagCategories[cat].push(name);
  }

  save();
  render();
}

////////////////////
// トースト
////////////////////
function toast(msg){
  let t=document.getElementById("toast");
  t.textContent=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

////////////////////
// 初期
////////////////////
render();

</script>

</body>
</html>
