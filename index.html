<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

.tab{display:flex;}
.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}
.tab button.active{
  background:#222;
  color:#fff;
}

.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

.tag-select{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#eee;
  cursor:pointer;
}

.tag-select.active{
  background:#222;
  color:#fff;
}

button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* 🔥追加成功メッセージ */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
  pointer-events:none;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="tab">
  <button onclick="switchTab('list')" id="tabList" class="active">検索</button>
  <button onclick="switchTab('add')" id="tabAdd">追加</button>
  <button onclick="switchTab('tag')" id="tabTag">タグ管理</button>
</div>

<div class="container">

<!-- 検索 -->
<div id="listTab">
  <div id="filterTags"></div>
  <div id="list"></div>
</div>

<!-- 追加 -->
<div id="addTab" style="display:none">
  <input id="name" placeholder="名前"><br><br>

  <div id="addTags"></div>

  <div style="margin:8px 0;">
    <b>選択中：</b>
    <div id="selectedAddTags"></div>
  </div>

  <textarea id="memo" placeholder="メモ"></textarea><br><br>
  <input type="file" id="imageInput" multiple><br><br>

  <button onclick="addItem()">追加</button>
</div>

<!-- タグ管理 -->
<div id="tagTab" style="display:none">
  <h3>タグ管理</h3>

  <select id="newTagCat">
    <option value="type">type</option>
    <option value="time">time</option>
    <option value="freq">freq</option>
    <option value="body">body</option>
  </select>

  <input id="newTagName" placeholder="タグ名">
  <button onclick="addTag()">追加</button>

  <hr>
  <div id="tagList"></div>
</div>

</div>

<!-- トースト -->
<div id="toast" class="toast">追加しました</div>

<script>

let data = JSON.parse(localStorage.getItem("trainingApp") || "[]");

let tagCategories = JSON.parse(localStorage.getItem("tagCategories") || JSON.stringify({
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
}));

let selectedTags = [];
let addSelectedTags = [];

const list = document.getElementById("list");

function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
  localStorage.setItem("tagCategories", JSON.stringify(tagCategories));
}

////////////////////////
// 🔥トースト表示
////////////////////////
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  },1500);
}

////////////////////////
// ➕追加（完全版）
////////////////////////
function addItem(){
  let name=document.getElementById("name").value.trim();
  let memo=document.getElementById("memo").value;
  let files=document.getElementById("imageInput").files;

  if(!name){
    alert("名前を入力してね");
    return;
  }

  let ps=[];
  for(let f of files){
    ps.push(new Promise(r=>{
      let fr=new FileReader();
      fr.onload=()=>r(fr.result);
      fr.readAsDataURL(f);
    }));
  }

  Promise.all(ps).then(imgs=>{

    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo,
      images:imgs,
      logs:[]
    });

    save();

    // 🔥入力リセット
    document.getElementById("name").value="";
    document.getElementById("memo").value="";
    document.getElementById("imageInput").value="";
    addSelectedTags=[];

    renderTags();
    render();

    // 🔥成功表示
    showToast("追加しました");

    switchTab("list");
  });
}

////////////////////////
// 🏷タグUI
////////////////////////
function renderTags(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      html+=`
        <span class="tag-select ${selectedTags.includes(tag)?"active":""}"
        onclick="toggleTag('${tag}')">${tag}</span>
      `;
    });
  });
  filterTags.innerHTML=html;

  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      addHtml+=`
        <span class="tag-select ${addSelectedTags.includes(tag)?"active":""}"
        onclick="toggleAddTag('${tag}')">${tag}</span>
      `;
    });
  });
  addTags.innerHTML=addHtml;

  selectedAddTags.innerHTML =
    addSelectedTags.length
      ? addSelectedTags.map(t=>`<span class="tag">${t}</span>`).join("")
      : "なし";
}

function toggleAddTag(tag){
  addSelectedTags = addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];

  renderTags();
}

function toggleTag(tag){
  selectedTags = selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];

  render();
}

////////////////////////
// 🧾描画（最小版）
////////////////////////
function render(){
  list.innerHTML="";

  data.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b><br>
      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
      <div>${item.memo||""}</div>
    `;

    list.appendChild(div);
  });
}

renderTags();
render();

</script>

</body>
</html>
