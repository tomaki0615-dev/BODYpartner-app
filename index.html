<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

.tab{
  display:flex;
}

.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}

.tab button.active{
  background:#222;
  color:#fff;
}

.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

.tag-select{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#eee;
  cursor:pointer;
}

.tag-select.active{
  background:#222;
  color:#fff;
}

button{
  padding:5px 10px;
  margin:2px;
}

.big-btn{
  background:#28a745;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* ===== モーダル ===== */
.modal-overlay{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal{
  width:100%;
  text-align:center;
  color:#fff;
}

/* メイン画像 */
.modal img{
  width:90vw;
  max-width:600px;
  border-radius:10px;
  transition:0.2s;
  cursor:zoom-in;
}

.modal img.zoomed{
  width:95vw !important;
  max-width:900px;
}

/* インジケーター */
.indicator{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#666;
}

.dot.active{
  background:#fff;
}

.nav{
  margin-top:10px;
}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="tab">
  <button onclick="switchTab('list')" id="tabList" class="active">検索</button>
  <button onclick="switchTab('add')" id="tabAdd">追加</button>
  <button onclick="switchTab('tag')" id="tabTag">タグ管理</button>
</div>

<div class="container">

<div id="listTab">
  <button onclick="toggleMode()">検索モード: <span id="mode">OR</span></button>
  <div id="filterTags"></div>
  <div id="list"></div>
</div>

<div id="addTab" style="display:none">
  <input id="name" placeholder="名前"><br><br>

  <div id="addTags"></div>

  <textarea id="memo" placeholder="メモ"></textarea><br><br>

  <input type="file" id="imageInput" multiple><br><br>

  <button onclick="addItem()">追加</button>
</div>

<div id="tagTab" style="display:none">
  <h3>タグ管理</h3>

  <select id="newTagCat">
    <option value="type">type</option>
    <option value="time">time</option>
    <option value="freq">freq</option>
    <option value="body">body</option>
  </select>

  <input id="newTagName" placeholder="タグ名">
  <button onclick="addTag()">追加</button>

  <hr>
  <div id="tagList"></div>
</div>

</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("trainingApp") || "[]");

let tagCategories = JSON.parse(localStorage.getItem("tagCategories") || JSON.stringify({
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
}));

let selectedTags = [];
let addSelectedTags = [];
let mode = "OR";

/* DOM */
const listTab = document.getElementById("listTab");
const addTab = document.getElementById("addTab");
const tagTab = document.getElementById("tagTab");

const filterTags = document.getElementById("filterTags");
const addTags = document.getElementById("addTags");
const list = document.getElementById("list");

function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
  localStorage.setItem("tagCategories", JSON.stringify(tagCategories));
}

/* ===== タブ ===== */
function switchTab(tab){
  listTab.style.display = tab==="list"?"block":"none";
  addTab.style.display = tab==="add"?"block":"none";
  tagTab.style.display = tab==="tag"?"block":"none";

  tabList.classList.toggle("active",tab==="list");
  tabAdd.classList.toggle("active",tab==="add");
  tabTag.classList.toggle("active",tab==="tag");

  renderTags();
  renderTagManager();
  render();
}

/* ===== タグ ===== */
function addTag(){
  let cat = document.getElementById("newTagCat").value;
  let name = document.getElementById("newTagName").value.trim();
  if(!name) return;

  if(!tagCategories[cat].includes(name)){
    tagCategories[cat].push(name);
    save();
  }

  document.getElementById("newTagName").value="";
  renderTags();
  renderTagManager();
}

function deleteTag(cat, tag){
  tagCategories[cat] = tagCategories[cat].filter(t=>t!==tag);
  save();
  renderTags();
  renderTagManager();
}

function editTag(cat, oldTag){
  let newName = prompt("新しいタグ名", oldTag);
  if(!newName) return;

  let arr = tagCategories[cat];
  let idx = arr.indexOf(oldTag);
  if(idx !== -1) arr[idx] = newName;

  save();
  renderTags();
  renderTagManager();
}

function renderTagManager(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html += `<h4>${cat}</h4>`;
    tags.forEach(tag=>{
      html += `
        <div>
          ${tag}
          <button onclick="editTag('${cat}','${tag}')">編集</button>
          <button onclick="deleteTag('${cat}','${tag}')">削除</button>
        </div>
      `;
    });
  });
  tagList.innerHTML = html;
}

/* ===== タグUI ===== */
function renderTags(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}：</div>`;
    tags.forEach(tag=>{
      html+=`<span class="tag-select ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
    });
  });
  filterTags.innerHTML=html;

  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}：</div>`;
    tags.forEach(tag=>{
      addHtml+=`<span class="tag-select ${addSelectedTags.includes(tag)?"active":""}" onclick="toggleAddTag('${tag}')">${tag}</span>`;
    });
  });
  addTags.innerHTML=addHtml;
}

function toggleTag(tag){
  selectedTags = selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];

  renderTags();
  render();
}

function toggleAddTag(tag){
  addSelectedTags = addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];

  renderTags();
}

/* ===== 追加 ===== */
function addItem(){
  let name = document.getElementById("name").value;
  if(!name) return;

  let files = document.getElementById("imageInput").files;
  let promises = [];

  for(let file of files){
    promises.push(new Promise(res=>{
      let reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.readAsDataURL(file);
    }));
  }

  Promise.all(promises).then(results=>{
    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo:document.getElementById("memo").value,
      images:results,
      logs:[]
    });

    save();

    document.getElementById("name").value="";
    document.getElementById("memo").value="";
    document.getElementById("imageInput").value="";
    addSelectedTags=[];

    switchTab("list");
  });
}

/* ===== ロジック ===== */
function toggleMode(){
  mode = mode==="OR"?"AND":"OR";
  document.getElementById("mode").innerText = mode;
  render();
}

function match(item){
  if(selectedTags.length===0) return true;

  return mode==="AND"
    ? selectedTags.every(t=>item.tags.includes(t))
    : selectedTags.some(t=>item.tags.includes(t));
}

/* ===== カルーセル ===== */
function openDetail(item){
  let modal = document.getElementById("modalContent");

  let index = 0;

  function render(){
    modal.innerHTML = `
      <div>
        <img id="mainImg" src="${item.images[index]}">
      </div>

      <div class="nav">
        <button onclick="prev()">◀</button>
        <span>${index+1} / ${item.images.length}</span>
        <button onclick="next()">▶</button>
      </div>

      <div class="indicator">
        ${item.images.map((_,i)=>`
          <div class="dot ${i===index?'active':''}"></div>
        `).join("")}
      </div>
    `;

    document.getElementById("mainImg").onclick = function(){
      this.classList.toggle("zoomed");
    };
  }

  window.next = function(){
    index = (index + 1) % item.images.length;
    render();
  }

  window.prev = function(){
    index = (index - 1 + item.images.length) % item.images.length;
    render();
  }

  render();
  document.getElementById("modalOverlay").style.display="flex";
}

function closeModal(e){
  if(e.target.id==="modalOverlay"){
    document.getElementById("modalOverlay").style.display="none";
  }
}

/* ===== 描画 ===== */
function render(){
  let filtered = data.filter(match);

  list.innerHTML="";

  filtered.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.onclick = ()=>openDetail(item);
    div.style.cursor="pointer";

    div.innerHTML=`
      <b>${item.name}</b><br>

      <div>
        ${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
      </div>

      <div>${item.memo||""}</div>

      <div>枚数: ${item.images.length}</div>
    `;

    list.appendChild(div);
  });
}

/* init */
renderTags();
renderTagManager();
render();
</script>

</body>
</html>
