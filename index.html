<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* ギャラリー */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal{color:#fff;text-align:center;}

#mainImg{
  width:90vw;
  max-width:600px;
  border-radius:10px;
  touch-action:none;
  cursor:zoom-in;
}

#mainImg.zoomed{
  width:95vw !important;
  max-width:900px;
}

.indicator{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:10px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#666;
}

.dot.active{background:#fff;}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="container">
  <div id="list"></div>
</div>

<!-- ギャラリー -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>

/////////////////////////////
// ✅① 正しいデータ取得
/////////////////////////////
let data = JSON.parse(localStorage.getItem("trainingApp") || "[]");

function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
}

const list = document.getElementById("list");
const modalOverlay = document.getElementById("modalOverlay");
const modalContent = document.getElementById("modalContent");

/////////////////////////////
// 🧠カード描画
/////////////////////////////
function render(){
  list.innerHTML="";

  if(data.length === 0){
    list.innerHTML = "<p>データがありません</p>";
    return;
  }

  data.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b><br>

      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}

      <div>${item.memo||""}</div>

      <div>回数: ${item.logs?.length||0}</div>

      <div>
        ${item.images?.[0]?`<img src="${item.images[0]}" width="60">`:""}
      </div>

      <button class="big-btn" onclick="openGallery(${item.id})">
        開く
      </button>
    `;

    list.appendChild(div);
  });
}

/////////////////////////////
// 📸ギャラリー
/////////////////////////////
function openGallery(id){
  const item = data.find(d=>d.id===id);
  if(!item || !item.images || item.images.length===0) return;

  let i = 0;

  function draw(){
    modalContent.innerHTML=`
      <img id="mainImg" src="${item.images[i]}">

      <div>
        <button onclick="prev()">◀</button>
        ${i+1}/${item.images.length}
        <button onclick="next()">▶</button>
      </div>

      <div class="indicator">
        ${item.images.map((_,k)=>`
          <div class="dot ${k===i?'active':''}"></div>
        `).join("")}
      </div>
    `;

    const img = document.getElementById("mainImg");

    img.onclick = ()=>img.classList.toggle("zoomed");

    let sx=0, sy=0;

    img.ontouchstart = e=>{
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
    };

    img.ontouchend = e=>{
      let ex = e.changedTouches[0].clientX;
      let ey = e.changedTouches[0].clientY;

      let dx = ex - sx;
      let dy = ey - sy;

      if(Math.abs(dx) > Math.abs(dy)){
        if(dx < -50) next();
        if(dx > 50) prev();
      }else{
        // 下スワイプで閉じる
        if(dy > 80){
          close();
        }
      }
    };
  }

  window.next = ()=>{
    i = (i+1)%item.images.length;
    draw();
  };

  window.prev = ()=>{
    i = (i-1+item.images.length)%item.images.length;
    draw();
  };

  function close(){
    modalOverlay.style.display="none";
    modalContent.innerHTML="";
  }

  modalOverlay.onclick = (e)=>{
    if(e.target === modalOverlay) close();
  };

  draw();
  modalOverlay.style.display="flex";
}

/////////////////////////////
// 🚀初期描画
/////////////////////////////
render();

</script>

</body>
</html>
