<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ボディケア管理</title>

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#222;color:#fff;padding:10px;text-align:center;}
.tab{display:flex;}
.tab button{flex:1;padding:10px;border:none;background:#ddd;}
.tab .active{background:#222;color:#fff;}
.container{padding:10px;}
.card{background:#fff;margin-bottom:10px;padding:10px;border-radius:10px;}
.tag{display:inline-block;padding:4px 8px;margin:2px;border-radius:10px;font-size:12px;color:#fff;}
.type{background:#007bff;}
.time{background:#28a745;}
.freq{background:#ffc107;color:#000;}
.body{background:#e83e8c;}
.tag-select{display:inline-block;padding:4px 8px;margin:2px;border-radius:10px;background:#eee;}
.tag-select.active{background:#222;color:#fff;}
.big-btn{background:#28a745;color:#fff;border:none;padding:10px;width:100%;border-radius:10px;}
.star{font-size:20px;cursor:pointer;}
img{width:70px;margin:5px;border-radius:8px;}
.small{font-size:12px;color:#666;}
</style>
</head>

<body>

<header>ボディケア管理</header>

<div class="tab">
<button onclick="switchTab('list')" id="tabList" class="active">検索</button>
<button onclick="switchTab('add')" id="tabAdd">追加</button>
<button onclick="switchTab('tag')">タグ管理</button>
</div>

<div class="container">

<div id="listTab">
<button onclick="toggleMode()">検索: <span id="mode">OR</span></button>
<div id="filterTags"></div>
<div id="list"></div>
</div>

<div id="addTab" style="display:none">
<input id="name" placeholder="名前"><br><br>
<div id="addTags"></div>
<textarea id="memo"></textarea><br>
<input type="file" id="imageInput" multiple><br><br>
<button onclick="addItem()">追加</button>
</div>

<div id="tagTab" style="display:none">
<input id="newTag">
<select id="tagCat">
<option value="type">種類</option>
<option value="time">時間</option>
<option value="freq">頻度</option>
<option value="body">部位</option>
</select>
<button onclick="addTag()">追加</button>
<div id="tagList"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("trainingApp")||"[]");

let tagCategories = JSON.parse(localStorage.getItem("tags")) || {
  type:["筋トレ","ストレッチ"],
  time:["朝","夜"],
  freq:["毎日"],
  body:["上半身","下半身"]
};

let selectedTags=[], addSelectedTags=[], mode="OR";

function save(){
  localStorage.setItem("trainingApp",JSON.stringify(data));
  localStorage.setItem("tags",JSON.stringify(tagCategories));
}

function switchTab(tab){
  listTab.style.display=tab==="list"?"block":"none";
  addTab.style.display=tab==="add"?"block":"none";
  tagTab.style.display=tab==="tag"?"block":"none";

  tabList.classList.remove("active");
  tabAdd.classList.remove("active");

  if(tab==="list") tabList.classList.add("active");
  if(tab==="add") tabAdd.classList.add("active");
}

function renderTags(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      html+=`<span class="tag-select ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
    });
  });
  filterTags.innerHTML=html;

  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      addHtml+=`<span class="tag-select ${addSelectedTags.includes(tag)?"active":""}" onclick="toggleAddTag('${tag}')">${tag}</span>`;
    });
  });
  addTags.innerHTML=addHtml;

  renderTagManager();
}

function renderTagManager(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div><b>${cat}</b><br>`;
    tags.forEach(tag=>{
      html+=`${tag} <button onclick="deleteTag('${cat}','${tag}')">削除</button><br>`;
    });
    html+="</div>";
  });
  tagList.innerHTML=html;
}

function addTag(){
  let t=document.getElementById("newTag").value;
  let c=document.getElementById("tagCat").value;
  if(!t)return;
  tagCategories[c].push(t);
  document.getElementById("newTag").value="";
  save(); renderTags();
}

function deleteTag(cat,tag){
  tagCategories[cat]=tagCategories[cat].filter(t=>t!==tag);
  save(); renderTags();
}

function toggleTag(tag){
  selectedTags = selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];
  renderTags(); render();
}

function toggleAddTag(tag){
  addSelectedTags = addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];
  renderTags();
}

function addItem(){
  let name=document.getElementById("name").value;
  let memo=document.getElementById("memo").value;
  let files=document.getElementById("imageInput").files;

  if(!name) return;

  let promises=[...files].map(file=>new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  }));

  Promise.all(promises).then(images=>{
    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo,
      images,
      favorite:false,
      logs:[]
    });

    save();

    document.getElementById("name").value="";
    document.getElementById("memo").value="";
    document.getElementById("imageInput").value="";
    addSelectedTags=[];

    switchTab("list");
    render();
  });
}

function toggleMode(){
  mode=mode==="OR"?"AND":"OR";
  document.getElementById("mode").innerText = mode;
  render();
}

function match(item){
  if(!selectedTags.length)return true;
  return mode==="AND"
    ? selectedTags.every(t=>item.tags.includes(t))
    : selectedTags.some(t=>item.tags.includes(t));
}

function addLog(item){
  item.logs.push(new Date().toISOString());
  save(); render();
}

function deleteLog(item,i){
  item.logs.splice(i,1);
  save(); render();
}

function toggleFav(item){
  item.favorite=!item.favorite;
  save(); render();
}

function deleteItem(id){
  data=data.filter(d=>d.id!==id);
  save(); render();
}

function editItem(item){
  let name=prompt("名前",item.name);
  if(name!==null)item.name=name;
  let memo=prompt("メモ",item.memo);
  if(memo!==null)item.memo=memo;
  save(); render();
}

function getTagClass(tag){
  for(let [cat,tags] of Object.entries(tagCategories)){
    if(tags.includes(tag))return cat;
  }
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  data.filter(match)
      .sort((a,b)=>b.favorite-a.favorite)
      .forEach(item=>{
    let last=item.logs.length ? item.logs[item.logs.length-1].slice(0,10) : "-";

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <span class="star" onclick="toggleFav(data.find(d=>d.id==${item.id}))">
          ${item.favorite?"⭐":"☆"}
        </span>
        <b>${item.name}</b>
      </div>

      <div>
        ${item.tags.map(t=>`<span class="tag ${getTagClass(t)}">${t}</span>`).join("")}
      </div>

      <div>${item.memo||""}</div>

      <div class="small">
        回数: ${item.logs.length} / 最終: ${last}
      </div>

      <div>
        ${item.images.map((img,i)=>`
          <img src="${img}">
          <button onclick="data.find(d=>d.id==${item.id}).images.splice(${i},1);save();render();">削除</button>
        `).join("")}
      </div>

      <button class="big-btn" onclick="addLog(data.find(d=>d.id==${item.id}))">やった！</button>

      <div>
        ${item.logs.map((l,i)=>`
          ${l.slice(0,10)} <button onclick="deleteLog(data.find(d=>d.id==${item.id}),${i})">削除</button><br>
        `).join("")}
      </div>

      <button onclick="editItem(data.find(d=>d.id==${item.id}))">編集</button>
      <button onclick="deleteItem(${item.id})">削除</button>
    `;

    list.appendChild(div);
  });
}

renderTags();
render();
</script>

</body>
</html>
