<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

.tab{display:flex;}
.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}
.tab button.active{
  background:#222;
  color:#fff;
}

.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* ===== モーダル ===== */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal{
  text-align:center;
  color:#fff;
  width:100%;
}

#mainImg{
  width:90vw;
  max-width:600px;
  border-radius:10px;
  transition:0.2s;
  touch-action:none; /* 超重要 */
  cursor:grab;
}

#mainImg.zoomed{
  width:95vw !important;
  max-width:900px;
}

.indicator{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:10px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#666;
}

.dot.active{background:#fff;}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="container">
  <div id="list"></div>
</div>

<!-- ギャラリー -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let data = [
  {
    id:1,
    name:"サンプル",
    tags:["筋トレ"],
    memo:"テスト",
    images:[
      "https://picsum.photos/400/300",
      "https://picsum.photos/401/300",
      "https://picsum.photos/402/300"
    ],
    logs:[]
  }
];

const list = document.getElementById("list");
const modalOverlay = document.getElementById("modalOverlay");
const modalContent = document.getElementById("modalContent");

/* ===== カード表示 ===== */
function render(){
  list.innerHTML="";

  data.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b><br>
      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}

      <div>
        ${item.images?.[0]?`<img src="${item.images[0]}" width="60">`:""}
      </div>

      <button class="big-btn" onclick="openGallery(${item.id})">
        開く
      </button>
    `;

    list.appendChild(div);
  });
}

/* ===== ギャラリー ===== */
function openGallery(id){
  const item = data.find(d=>d.id===id);
  let i = 0;

  let startX = 0;
  let startY = 0;
  let deltaX = 0;
  let deltaY = 0;

  function draw(){
    modalContent.innerHTML=`
      <img id="mainImg" src="${item.images[i]}">

      <div>
        <button onclick="prev()">◀</button>
        ${i+1}/${item.images.length}
        <button onclick="next()">▶</button>
      </div>

      <div class="indicator">
        ${item.images.map((_,k)=>`
          <div class="dot ${k===i?'active':''}"></div>
        `).join("")}
      </div>
    `;

    const img = document.getElementById("mainImg");

    // ズーム
    img.onclick = ()=>img.classList.toggle("zoomed");

    /* ===== スワイプ制御 ===== */
    img.addEventListener("touchstart",(e)=>{
      const t=e.touches[0];
      startX=t.clientX;
      startY=t.clientY;
    });

    img.addEventListener("touchmove",(e)=>{
      const t=e.touches[0];
      deltaX = t.clientX - startX;
      deltaY = t.clientY - startY;
    });

    img.addEventListener("touchend",()=>{
      // 横スワイプ
      if(Math.abs(deltaX) > Math.abs(deltaY)){
        if(deltaX < -50) next();
        if(deltaX > 50) prev();
      }

      // 🔥下スワイプで閉じる
      if(deltaY > 80){
        closeGallery();
      }

      deltaX=0;
      deltaY=0;
    });
  }

  window.next=()=>{
    i = (i+1)%item.images.length;
    draw();
  };

  window.prev=()=>{
    i = (i-1+item.images.length)%item.images.length;
    draw();
  };

  function closeGallery(){
    modalOverlay.style.display="none";
    modalContent.innerHTML="";
  }

  modalOverlay.onclick=(e)=>{
    if(e.target===modalOverlay){
      closeGallery();
    }
  };

  draw();
  modalOverlay.style.display="flex";
}

render();
</script>

</body>
</html>
