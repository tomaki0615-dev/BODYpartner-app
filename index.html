<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

.tab{
  display:flex;
}

.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}

.tab button.active{
  background:#222;
  color:#fff;
}

.container{
  padding:10px;
}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:3px 8px;
  margin:2px;
  background:#eee;
  border-radius:10px;
  font-size:12px;
}

.tag.active{
  background:#222;
  color:#fff;
}

button{
  padding:5px 10px;
  margin:2px;
}

.big-btn{
  background:#28a745;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

.star{
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="tab">
  <button onclick="switchTab('list')" id="tabList" class="active">検索</button>
  <button onclick="switchTab('add')" id="tabAdd">追加</button>
</div>

<div class="container">

<!-- 検索 -->
<div id="listTab">

<div>
  <button onclick="toggleMode()">検索モード: <span id="mode">OR</span></button>
</div>

<div id="filterTags"></div>

<div id="list"></div>

</div>

<!-- 追加 -->
<div id="addTab" style="display:none">

<input id="name" placeholder="名前"><br><br>

<div id="addTags"></div>

<textarea id="memo" placeholder="メモ"></textarea><br>

<button onclick="addItem()">追加</button>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("trainingApp") || "[]");

let tags = ["筋トレ","ストレッチ","マッサージ","朝","夜","毎日","上半身","下半身"];

let selectedTags = [];
let mode = "OR";

function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
}

function switchTab(tab){
  document.getElementById("listTab").style.display = tab==="list"?"block":"none";
  document.getElementById("addTab").style.display = tab==="add"?"block":"none";

  document.getElementById("tabList").classList.remove("active");
  document.getElementById("tabAdd").classList.remove("active");

  if(tab==="list"){
    document.getElementById("tabList").classList.add("active");
  } else {
    document.getElementById("tabAdd").classList.add("active");
  }
}

function renderTags(){
  let html="";
  tags.forEach(tag=>{
    html+=`<span class="tag ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
  });
  document.getElementById("filterTags").innerHTML=html;
  document.getElementById("addTags").innerHTML=html.replace(/toggleTag/g,"toggleAddTag");
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags = selectedTags.filter(t=>t!==tag);
  } else {
    selectedTags.push(tag);
  }
  renderTags();
  render();
}

let addSelectedTags = [];

function toggleAddTag(tag){
  if(addSelectedTags.includes(tag)){
    addSelectedTags = addSelectedTags.filter(t=>t!==tag);
  } else {
    addSelectedTags.push(tag);
  }
  renderTags();
}

function addItem(){
  let name = document.getElementById("name").value;

  if(!name) return;

  data.push({
    id: Date.now(),
    name,
    tags: addSelectedTags,
    memo: document.getElementById("memo").value,
    favorite:false,
    logs:[]
  });

  save();

  document.getElementById("name").value="";
  document.getElementById("memo").value="";
  addSelectedTags=[];

  switchTab("list");
  render();
}

function toggleMode(){
  mode = mode==="OR"?"AND":"OR";
  document.getElementById("mode").innerText = mode;
  render();
}

function match(item){
  if(selectedTags.length===0) return true;

  if(mode==="AND"){
    return selectedTags.every(tag=>item.tags.includes(tag));
  } else {
    return selectedTags.some(tag=>item.tags.includes(tag));
  }
}

function addLog(item){
  let today = new Date().toISOString().split('T')[0];
  item.logs.push({date:today});
  save();
  render();
}

function toggleFav(item){
  item.favorite = !item.favorite;
  save();
  render();
}

function render(){
  let list = document.getElementById("list");

  let filtered = data.filter(match);

  filtered.sort((a,b)=>b.favorite - a.favorite);

  list.innerHTML="";

  filtered.forEach(item=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <span class="star" onclick="toggleFav(data.find(d=>d.id==${item.id}))">
          ${item.favorite?"⭐":"☆"}
        </span>
        <b>${item.name}</b>
      </div>

      <div>
        ${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
      </div>

      <div>${item.memo || ""}</div>

      <div>回数: ${item.logs.length}</div>

      <button class="big-btn" onclick="addLog(data.find(d=>d.id==${item.id}))">
        やった！
      </button>
    `;

    list.appendChild(div);
  });
}

renderTags();
render();
</script>

</body>
</html>
