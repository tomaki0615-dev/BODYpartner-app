<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

/* タブ */
.tab{display:flex;}
.tab button{
  flex:1;
  padding:10px;
  border:none;
  background:#ddd;
}
.tab button.active{
  background:#222;
  color:#fff;
}

.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

/* タグ */
.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

.tag-select{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#eee;
  cursor:pointer;
}

.tag-select.active{
  background:#222;
  color:#fff;
}

/* ボタン */
button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* ギャラリー */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal{color:#fff;text-align:center;}

#mainImg{
  width:90vw;
  max-width:600px;
  border-radius:10px;
  touch-action:none;
  cursor:zoom-in;
}

#mainImg.zoomed{
  width:95vw !important;
  max-width:900px;
}

.indicator{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:10px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#666;
}

.dot.active{background:#fff;}
</style>
</head>

<body>

<header>筋トレ・ストレッチ管理</header>

<div class="tab">
  <button onclick="switchTab('list')" id="tabList" class="active">検索</button>
  <button onclick="switchTab('add')" id="tabAdd">追加</button>
  <button onclick="switchTab('tag')" id="tabTag">タグ管理</button>
</div>

<div class="container">

<!-- 検索 -->
<div id="listTab">
  <div id="filterTags"></div>
  <div id="list"></div>
</div>

<!-- 追加 -->
<div id="addTab" style="display:none">
  <input id="name" placeholder="名前"><br><br>

  <div id="addTags"></div>

  <!-- ★追加：見える化 -->
  <div style="margin:8px 0;">
    <b>選択中：</b>
    <div id="selectedAddTags"></div>
  </div>

  <textarea id="memo" placeholder="メモ"></textarea><br><br>
  <input type="file" id="imageInput" multiple><br><br>
  <button onclick="addItem()">追加</button>
</div>

<!-- タグ管理 -->
<div id="tagTab" style="display:none">
  <h3>タグ管理</h3>

  <select id="newTagCat">
    <option value="type">type</option>
    <option value="time">time</option>
    <option value="freq">freq</option>
    <option value="body">body</option>
  </select>

  <input id="newTagName" placeholder="タグ名">
  <button onclick="addTag()">追加</button>

  <hr>
  <div id="tagList"></div>
</div>

</div>

<!-- ギャラリー -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>

//////////////////////
// 🧠データ
//////////////////////
let data = JSON.parse(localStorage.getItem("trainingApp") || "[]");

let tagCategories = JSON.parse(localStorage.getItem("tagCategories") || JSON.stringify({
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
}));

let selectedTags = [];
let addSelectedTags = [];

const list = document.getElementById("list");
const modalOverlay = document.getElementById("modalOverlay");
const modalContent = document.getElementById("modalContent");

function save(){
  localStorage.setItem("trainingApp", JSON.stringify(data));
  localStorage.setItem("tagCategories", JSON.stringify(tagCategories));
}

//////////////////////
// 🧭タブ
//////////////////////
function switchTab(tab){
  listTab.style.display = tab==="list"?"block":"none";
  addTab.style.display = tab==="add"?"block":"none";
  tagTab.style.display = tab==="tag"?"block":"none";

  tabList.classList.toggle("active",tab==="list");
  tabAdd.classList.toggle("active",tab==="add");
  tabTag.classList.toggle("active",tab==="tag");

  renderTags();
  renderTagManager();
  render();
}

//////////////////////
// 🏷タグUI
//////////////////////
function renderTags(){

  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      html+=`
        <span class="tag-select ${selectedTags.includes(tag)?"active":""}"
        onclick="toggleTag('${tag}')">${tag}</span>
      `;
    });
  });
  filterTags.innerHTML=html;

  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      addHtml+=`
        <span class="tag-select ${addSelectedTags.includes(tag)?"active":""}"
        onclick="toggleAddTag('${tag}')">${tag}</span>
      `;
    });
  });
  addTags.innerHTML=addHtml;

  // ★追加：選択状態見える化
  if(document.getElementById("selectedAddTags")){
    selectedAddTags.innerHTML =
      addSelectedTags.length
        ? addSelectedTags.map(t=>`<span class="tag">${t}</span>`).join("")
        : "なし";
  }
}

function toggleTag(tag){
  selectedTags = selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];

  renderTags();
  render();
}

//////////////////////
// ★ここが今回の修正ポイント
//////////////////////
function toggleAddTag(tag){
  addSelectedTags = addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];

  renderTags(); // ←これで即反映
}

//////////////////////
// ➕追加
//////////////////////
function addItem(){
  let name=nameInput.value;
  if(!name) return;

  let files=imageInput.files;
  let ps=[];

  for(let f of files){
    ps.push(new Promise(r=>{
      let fr=new FileReader();
      fr.onload=()=>r(fr.result);
      fr.readAsDataURL(f);
    }));
  }

  Promise.all(ps).then(imgs=>{
    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo:memo.value,
      images:imgs,
      logs:[]
    });

    save();
    switchTab("list");
  });
}

//////////////////////
// 🧾タグ管理
//////////////////////
function addTag(){
  let cat=newTagCat.value;
  let name=newTagName.value.trim();
  if(!name) return;

  if(!tagCategories[cat].includes(name)){
    tagCategories[cat].push(name);
    save();
  }

  newTagName.value="";
  renderTags();
  renderTagManager();
}

function renderTagManager(){
  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<h4>${cat}</h4>`;
    tags.forEach(tag=>{
      html+=`
        <div>
          ${tag}
          <button onclick="deleteTag('${cat}','${tag}')">削除</button>
        </div>
      `;
    });
  });

  tagList.innerHTML=html;
}

function deleteTag(cat,tag){
  tagCategories[cat]=tagCategories[cat].filter(t=>t!==tag);
  save();
  renderTags();
  renderTagManager();
}

//////////////////////
// 💪やったボタン
//////////////////////
function addLog(id){
  let item=data.find(d=>d.id===id);
  if(!item) return;

  let today=new Date().toISOString().split("T")[0];

  if(!item.logs) item.logs=[];

  if(item.logs.some(l=>l.date===today)){
    alert("今日はすでに記録済み");
    return;
  }

  item.logs.push({date:today});
  save();
  render();
}

//////////////////////
// 📸ギャラリー
//////////////////////
function openDetail(item){
  let i=0;

  function draw(){
    modalContent.innerHTML=`
      <img id="mainImg" src="${item.images[i]}">
      <div>${i+1}/${item.images.length}</div>
    `;

    const img=document.getElementById("mainImg");

    img.onclick=()=>img.classList.toggle("zoomed");

    let sx=0,sy=0;

    img.ontouchstart=e=>{
      sx=e.touches[0].clientX;
      sy=e.touches[0].clientY;
    };

    img.ontouchend=e=>{
      let dx=e.changedTouches[0].clientX-sx;
      let dy=e.changedTouches[0].clientY-sy;

      if(Math.abs(dx)>Math.abs(dy)){
        if(dx<-50) next();
        if(dx>50) prev();
      }else{
        if(dy>80) modalOverlay.style.display="none";
      }
    };
  }

  window.next=()=>{i=(i+1)%item.images.length;draw();}
  window.prev=()=>{i=(i-1+item.images.length)%item.images.length;draw();}

  modalOverlay.onclick=(e)=>{
    if(e.target===modalOverlay){
      modalOverlay.style.display="none";
    }
  };

  draw();
  modalOverlay.style.display="flex";
}

//////////////////////
// 🧾描画
//////////////////////
function render(){
  list.innerHTML="";

  data.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.onclick=()=>openDetail(item);

    let last=item.logs?.length
      ? item.logs[item.logs.length-1].date
      : "-";

    div.innerHTML=`
      <b>${item.name}</b><br>

      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}

      <div>${item.memo||""}</div>

      <div>回数:${item.logs?.length||0}</div>
      <div>最終:${last}</div>

      <div>${item.images?.[0]?`<img src="${item.images[0]}" width="60">`:""}</div>

      <button class="big-btn"
        onclick="event.stopPropagation(); addLog(${item.id})">
        やった！
      </button>

      <button onclick="event.stopPropagation(); editItem(${item.id})">編集</button>
      <button onclick="event.stopPropagation(); deleteItem(${item.id})">削除</button>
    `;

    list.appendChild(div);
  });
}

//////////////////////
// ✏️編集削除
//////////////////////
function editItem(id){
  let item=data.find(d=>d.id===id);
  if(!item) return;

  let n=prompt("名前",item.name);
  if(n===null) return;

  let m=prompt("メモ",item.memo||"");
  if(m===null) return;

  item.name=n;
  item.memo=m;

  save();
  render();
}

function deleteItem(id){
  if(!confirm("削除する？")) return;

  data=data.filter(d=>d.id!==id);
  save();
  render();
}

//////////////////////
// 🚀初期化
//////////////////////
renderTags();
renderTagManager();
render();

</script>

</body>
</html>
