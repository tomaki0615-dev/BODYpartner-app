<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筋トレ管理アプリ 完全版</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
}

/* タブ */
.tab{
  display:flex;
  border-bottom:1px solid #ccc;
}
.tab button{
  flex:1;
  padding:12px;
  border:none;
  background:#ddd;
}
.tab button.active{
  background:#fff;
  border-bottom:2px solid #222;
}

/* コンテナ */
.container{padding:10px;}

.card{
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

/* タグ */
.tag{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#666;
  color:#fff;
}

.tag-select{
  display:inline-block;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:12px;
  background:#eee;
  cursor:pointer;
}
.tag-select.active{background:#222;color:#fff;}

/* ボタン */
button{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  font-size:12px;
}

.big-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* サムネ */
.thumb{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  margin-top:5px;
}

/* ギャラリー */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  color:#fff;
}

#mainImg{
  width:90vw;
  max-width:600px;
  border-radius:10px;
}

/* トースト */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<header>筋トレ管理</header>

<div class="tab">
  <button id="tabList" class="active" onclick="switchTab('list')">検索</button>
  <button id="tabAdd" onclick="switchTab('add')">追加</button>
  <button id="tabTag" onclick="switchTab('tag')">タグ</button>
</div>

<div class="container">

<!-- 検索 -->
<div id="listTab">
  <div id="filterTags"></div>
  <div id="list"></div>
</div>

<!-- 追加 -->
<div id="addTab" style="display:none">
  <input id="name" placeholder="名前"><br><br>

  <div id="addTags"></div>
  <div id="selectedAddTags"></div>

  <textarea id="memo" placeholder="メモ"></textarea><br><br>
  <input type="file" id="imageInput" multiple><br><br>

  <button onclick="addItem()">追加</button>
</div>

<!-- タグ -->
<div id="tagTab" style="display:none">
  <select id="newTagCat">
    <option value="type">type</option>
    <option value="time">time</option>
    <option value="freq">freq</option>
    <option value="body">body</option>
  </select>

  <input id="newTagName">
  <button onclick="addTag()">追加</button>

  <hr>
  <div id="tagList"></div>
</div>

</div>

<!-- ギャラリー -->
<div class="modal" id="modal">
  <img id="mainImg">
  <div>
    <button onclick="prev()">◀</button>
    <button onclick="next()">▶</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<div id="toast" class="toast">完了</div>

<script>

////////////////////
// データ
////////////////////
let data=JSON.parse(localStorage.getItem("trainingApp")||"[]");

let tagCategories=JSON.parse(localStorage.getItem("tagCategories")||JSON.stringify({
  type:["筋トレ","ストレッチ","マッサージ"],
  time:["朝","昼","夜"],
  freq:["毎日","週3","月水金"],
  body:["上半身","下半身","体幹","顔"]
}));

let selectedTags=[];
let addSelectedTags=[];

function save(){
  localStorage.setItem("trainingApp",JSON.stringify(data));
  localStorage.setItem("tagCategories",JSON.stringify(tagCategories));
}

////////////////////
// タブ
////////////////////
function switchTab(tab){

  listTab.style.display=tab==="list"?"block":"none";
  addTab.style.display=tab==="add"?"block":"none";
  tagTab.style.display=tab==="tag"?"block":"none";

  tabList.classList.toggle("active",tab==="list");
  tabAdd.classList.toggle("active",tab==="add");
  tabTag.classList.toggle("active",tab==="tag");

  renderTags();
  render();
  renderTagManager();
}

////////////////////
// タグ
////////////////////
function renderTags(){

  let html="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    html+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      html+=`
        <span class="tag-select ${selectedTags.includes(tag)?"active":""}"
        onclick="toggleTag('${tag}')">${tag}</span>
      `;
    });
  });
  filterTags.innerHTML=html;

  let addHtml="";
  Object.entries(tagCategories).forEach(([cat,tags])=>{
    addHtml+=`<div>${cat}</div>`;
    tags.forEach(tag=>{
      addHtml+=`
        <span class="tag-select ${addSelectedTags.includes(tag)?"active":""}"
        onclick="toggleAddTag('${tag}')">${tag}</span>
      `;
    });
  });
  addTags.innerHTML=addHtml;

  selectedAddTags.innerHTML=
    addSelectedTags.map(t=>`<span class="tag">${t}</span>`).join("");
}

function toggleTag(tag){
  selectedTags=selectedTags.includes(tag)
    ? selectedTags.filter(t=>t!==tag)
    : [...selectedTags,tag];

  render();
  renderTags();
}

function toggleAddTag(tag){
  addSelectedTags=addSelectedTags.includes(tag)
    ? addSelectedTags.filter(t=>t!==tag)
    : [...addSelectedTags,tag];

  renderTags();
}

////////////////////
// 追加
////////////////////
function addItem(){

  let name=name.value;
  let memo=document.getElementById("memo").value;

  let files=imageInput.files;
  let ps=[];

  for(let f of files){
    ps.push(new Promise(r=>{
      let fr=new FileReader();
      fr.onload=()=>r(fr.result);
      fr.readAsDataURL(f);
    }));
  }

  Promise.all(ps).then(imgs=>{

    data.push({
      id:Date.now(),
      name,
      tags:addSelectedTags,
      memo,
      images:imgs,
      logs:[]
    });

    save();

    name.value="";
    memo.value="";
    imageInput.value="";
    addSelectedTags=[];

    toast("追加しました");
    renderTags();
    render();
    switchTab("list");
  });
}

////////////////////
// ギャラリー
////////////////////
let current=[],index=0;

function openGallery(item,i=0){
  current=item.images;
  index=i;
  modal.style.display="flex";
  draw();
}

function draw(){
  mainImg.src=current[index];
}

function next(){
  index=(index+1)%current.length;
  draw();
}

function prev(){
  index=(index-1+current.length)%current.length;
  draw();
}

function closeModal(){
  modal.style.display="none";
}

////////////////////
// カード描画（ここが重要）
////////////////////
function render(){
  list.innerHTML="";

  data.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${item.name}</b><br>

      ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}

      <div>${item.memo||""}</div>

      <div>回数：${item.logs?.length||0}</div>

      <div>
        ${(item.images||[]).map((img,i)=>
          `<img class="thumb" src="${img}" onclick="event.stopPropagation(); openGallery(data.find(d=>d.id==${item.id}),${i})">`
        ).join("")}
      </div>

      <button class="big-btn"
        onclick="event.stopPropagation(); addLog(${item.id})">
        やった！
      </button>

      <div>
        <button onclick="event.stopPropagation(); editItem(${item.id})">編集</button>
        <button onclick="event.stopPropagation(); deleteItem(${item.id})">削除</button>
      </div>
    `;

    list.appendChild(div);
  });
}

////////////////////
// やった
////////////////////
function addLog(id){
  let item=data.find(d=>d.id==id);
  let today=new Date().toISOString().split("T")[0];

  if(item.logs.some(l=>l.date===today)) return;

  item.logs.push({date:today});
  save();
  render();
}

////////////////////
// 編集・削除
////////////////////
function editItem(id){
  let item=data.find(d=>d.id==id);
  item.name=prompt("名前",item.name)||item.name;
  save();
  render();
}

function deleteItem(id){
  data=data.filter(d=>d.id!=id);
  save();
  render();
}

////////////////////
// タグ管理
////////////////////
function addTag(){
  let cat=newTagCat.value;
  let name=newTagName.value;

  if(!tagCategories[cat].includes(name)){
    tagCategories[cat].push(name);
  }

  save();
  renderTags();
  renderTagManager();
}

function renderTagManager(){
  tagList.innerHTML=Object.entries(tagCategories).map(([c,t])=>
    `<h4>${c}</h4>`+
    t.map(x=>`<div>${x}</div>`).join("")
  ).join("");
}

////////////////////
// UI
////////////////////
function toast(msg){
  toastBox.textContent=msg;
  toastBox.classList.add("show");
  setTimeout(()=>toastBox.classList.remove("show"),1500);
}

</script>

<div id="toast" class="toast"></div>

</body>
</html>
